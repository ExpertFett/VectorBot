# Railway/Nixpacks build config.
# Earlier attempts using Nix's yt-dlp + python3 packages failed at runtime
# with "/usr/bin/env: 'python3': No such file or directory" — Nix's Python
# isn't ending up on PATH in the final container even when declared in
# nixPkgs. So we sidestep Python entirely: download yt-dlp's standalone
# Linux binary (PyInstaller build with Python embedded) into /usr/local/bin
# during the install phase. No Python plumbing required at runtime.
# ffmpeg is still pinned via Nix as a backstop for ffmpeg-static.

[phases.setup]
nixPkgs = ["nodejs_24", "ffmpeg", "curl"]

[phases.install]
cmds = [
  "curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o /usr/local/bin/yt-dlp",
  "chmod +x /usr/local/bin/yt-dlp",
  "/usr/local/bin/yt-dlp --version",
  "npm ci || npm install"
]
