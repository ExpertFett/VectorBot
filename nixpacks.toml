# Railway/Nixpacks build config.
# Adds the yt-dlp binary to the deploy container so DisTube's yt-dlp plugin
# (used by /play) can extract YouTube audio. yt-dlp is the actively-maintained
# replacement for ytdl-core; it gets updates within hours when YouTube
# changes their player API, which is the whole reason we're using it.
# ffmpeg is also pinned here even though ffmpeg-static ships its own binary,
# as a backstop in case the static binary's GLIBC doesn't match the container.

[phases.setup]
nixPkgs = ["nodejs_24", "yt-dlp", "ffmpeg"]
